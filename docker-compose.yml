
version: '3.9'

services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jira_db
    ports:
      - "5432:5432"

  app:
    build: .
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
